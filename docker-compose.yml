# =====================================
# Noblekase — Docker Compose (Production)
# Dibuat oleh: PT Solusi Inovasi Bangsa (https://ide.asia)
# =====================================
#
# Setup di VPS:
#   1. Copy .env.example menjadi .env, isi semua values
#   2. Pastikan Caddyfile dan ./scripts/backup.sh ada
#   3. docker compose up -d
#
# Service:
#   - caddy        :80, :443  Reverse proxy + auto SSL
#   - app          :3000     Next.js + Payload (internal only, di-proxy via Caddy)
#   - postgres     :5432     PostgreSQL 16 (internal only)
#   - redis        :6379     Redis 7 cache (internal only)
# =====================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: noblekase-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Caddyfile menulis access log ke /var/log/caddy. Tanpa volume ini
      # direktorinya tidak ada di image resmi dan Caddy gagal start.
      - caddy_logs:/var/log/caddy
    depends_on:
      - app
    networks:
      - noblekase

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Diteruskan ke tahap builder. Next menanamkan NEXT_PUBLIC_* ke bundle
      # saat build, jadi menaruhnya di env_file saja tidak berpengaruh.
      # Compose mengambil nilainya dari .env di folder ini.
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
    image: noblekase-app:latest
    container_name: noblekase-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URI: postgres://${POSTGRES_USER:-noblekase}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-noblekase}
      REDIS_URL: redis://redis:6379
    volumes:
      # Bind mount, bukan named volume — berkas upload harus tetap ada dan
      # mudah di-backup dari host meskipun container dibangun ulang.
      - ./uploads:/app/uploads
    healthcheck:
      # Caddy sudah punya health check sendiri, tapi ini yang membuat
      # `docker compose ps` menunjukkan status sebenarnya dan menahan
      # restart beruntun saat aplikasi gagal boot.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      # Tanpa batas ini, log JSON Docker tumbuh tanpa henti dan bisa
      # menghabiskan disk VPS.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - noblekase

  postgres:
    image: postgres:16-alpine
    container_name: noblekase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noblekase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-noblekase}
    volumes:
      # Named volume: data database tidak boleh ikut terhapus saat
      # `docker compose down -v` dijalankan tanpa sengaja pada bind mount.
      - postgres_data:/var/lib/postgresql/data
      # Folder tujuan pg_dump (lihat scripts/backup.sh).
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noblekase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noblekase

  redis:
    image: redis:7-alpine
    container_name: noblekase-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - noblekase

  # Optional: Uptime Kuma untuk self-hosted monitoring
  # uptime:
  #   image: louislam/uptime-kuma:1
  #   container_name: noblekase-uptime
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:3001:3001"
  #   volumes:
  #     - uptime_data:/app/data
  #   networks:
  #     - noblekase

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
  postgres_data:
  redis_data:
  # uptime_data:

networks:
  noblekase:
    driver: bridge
