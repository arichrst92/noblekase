<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
    <rect width="1400" height="800" fill="#DCD5CB"/>
    
    <g opacity="0.22">
        <!-- desk horizon line -->
        <line x1="0" y1="544.0" x2="1400" y2="544.0" stroke="#3A3530" stroke-width="0.5"/>
        <!-- notebook -->
        <rect x="210.0" y="440.00000000000006" width="350.0" height="96.0" fill="none" stroke="#3A3530" stroke-width="0.8"/>
        <!-- mug -->
        <ellipse cx="868.0" cy="480.0" rx="84.0" ry="21.0" fill="none" stroke="#3A3530" stroke-width="0.7"/>
        <path d="M 784.0000000000001 480.0 L 797.9999999999999 544.0 L 938.0 544.0 L 952.0000000000001 480.0"
              fill="none" stroke="#3A3530" stroke-width="0.7"/>
        <!-- phone / device -->
        <rect x="1008.0" y="416.0" width="112.0" height="120.0" rx="3"
              fill="none" stroke="#7A6B58" stroke-width="0.8"/>
    </g>
    <text x="700.0" y="356.2" text-anchor="middle"
            font-family="Inter, system-ui, sans-serif" font-size="11"
            fill="#7A6B58" letter-spacing="3" font-weight="500">PROSES KAMI</text><text x="700.0" y="405.0" text-anchor="middle"
                font-family="Georgia, serif" font-size="36"
                fill="#3A3530" font-style="italic">Dipikirkan, lalu dibuat.</text><text x="700.0" y="442.8" text-anchor="middle"
            font-family="Inter, system-ui, sans-serif" font-size="12"
            fill="#9C8F7E" letter-spacing="0.5">Tiap produk lewat uji, sebelum sampai ke tangan kamu.</text>
    
    
        <g transform="translate(40, 760)" opacity="0.4">
            <line x1="0" y1="0" x2="20" y2="0" stroke="#3A3530" stroke-width="0.5"/>
            <line x1="0" y1="0" x2="0" y2="-20" stroke="#3A3530" stroke-width="0.5"/>
        </g>
    
    <text x="1360" y="770" text-anchor="end" font-family="Georgia, serif"
          font-size="11" fill="#3A3530" opacity="0.5" letter-spacing="2">NOBLEKASE</text>
