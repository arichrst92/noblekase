<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
    <rect width="800" height="1000" fill="#F8F4ED"/>
    <g transform="translate(0, -220.0)">
    <g transform="translate(350.0, 470.0)" opacity="0.35">
        <!-- charger body -->
        <rect x="0" y="20" width="100" height="60" rx="14" fill="none" stroke="#2A2A2A" stroke-width="1.2"/>
        <!-- prongs -->
        <rect x="38" y="0" width="6" height="22" fill="#2A2A2A"/>
        <rect x="56" y="0" width="6" height="22" fill="#2A2A2A"/>
        <!-- usb-c port -->
        <rect x="42" y="64" width="16" height="6" rx="3" fill="#B8AEA0"/>
        <!-- brand line -->
        <line x1="20" y1="50" x2="80" y2="50" stroke="#8B6F47" stroke-width="0.5" opacity="0.6"/>
    </g></g>
    <text x="400.0" y="736.2" text-anchor="middle"
            font-family="Inter, system-ui, sans-serif" font-size="11"
            fill="#8B6F47" letter-spacing="3" font-weight="500">DAYA</text><text x="400.0" y="785.0" text-anchor="middle"
                font-family="Georgia, serif" font-size="36"
                fill="#2A2A2A" font-style="italic">Charger &amp; Power</text>
    
    
        <g transform="translate(40, 960)" opacity="0.4">
            <line x1="0" y1="0" x2="20" y2="0" stroke="#2A2A2A" stroke-width="0.5"/>
            <line x1="0" y1="0" x2="0" y2="-20" stroke="#2A2A2A" stroke-width="0.5"/>
        </g>
    
    <text x="760" y="970" text-anchor="end" font-family="Georgia, serif"
          font-size="11" fill="#2A2A2A" opacity="0.5" letter-spacing="2">NOBLEKASE</text>
</svg>