        <rect x="0" y="0" width="14" height="80" fill="#1F2937"/>
        <rect x="62" y="0" width="14" height="80" fill="#1F2937"/>
        <line x1="14" y1="0" x2="62" y2="80" stroke="#1F2937" stroke-width="14"/>
