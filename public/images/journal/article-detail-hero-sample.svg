<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
    <rect width="1600" height="900" fill="#DCD5CB"/>
    
    <g transform="translate(750.0, 420.0)" opacity="0.35">
        <!-- charger body -->
        <rect x="0" y="20" width="100" height="60" rx="14" fill="none" stroke="#3A3530" stroke-width="1.2"/>
        <!-- prongs -->
        <rect x="38" y="0" width="6" height="22" fill="#3A3530"/>
        <rect x="56" y="0" width="6" height="22" fill="#3A3530"/>
        <!-- usb-c port -->
        <rect x="42" y="64" width="16" height="6" rx="3" fill="#9C8F7E"/>
        <!-- brand line -->
        <line x1="20" y1="50" x2="80" y2="50" stroke="#7A6B58" stroke-width="0.5" opacity="0.6"/>
    </g>
    <text x="800.0" y="385.5" text-anchor="middle"
            font-family="Inter, system-ui, sans-serif" font-size="11"
            fill="#7A6B58" letter-spacing="3" font-weight="500">PANDUAN / 5 MENIT BACA</text><text text-anchor="middle"
                font-family="Georgia, serif" font-size="36"
                fill="#3A3530" font-style="italic" y="434.3"><tspan x="800.0" dy="0">Memilih charger</tspan><tspan x="800.0" dy="41.4">untuk traveler.</tspan></text><text x="800.0" y="513.5" text-anchor="middle"
            font-family="Inter, system-ui, sans-serif" font-size="12"
            fill="#9C8F7E" letter-spacing="0.5">Oleh Tim Noblekase · Mei 2026</text>
    
    
        <g transform="translate(40, 860)" opacity="0.4">
            <line x1="0" y1="0" x2="20" y2="0" stroke="#3A3530" stroke-width="0.5"/>
            <line x1="0" y1="0" x2="0" y2="-20" stroke="#3A3530" stroke-width="0.5"/>
        </g>
    
    <text x="1560" y="870" text-anchor="end" font-family="Georgia, serif"
          font-size="11" fill="#3A3530" opacity="0.5" letter-spacing="2">NOBLEKASE</text>
</svg>